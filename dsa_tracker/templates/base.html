<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="A focused Java DSA learning tracker">
    <title>{% block title %}DSA Compass{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark app-navbar sticky-top">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('main.dashboard') }}">
                <span class="brand-mark">D</span>
                <span>DSA Compass</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <div class="navbar-nav ms-auto gap-lg-2">
                    <a class="nav-link {{ 'active' if request.endpoint == 'main.dashboard' }}" href="{{ url_for('main.dashboard') }}">Dashboard</a>
                    <a class="nav-link {{ 'active' if request.endpoint == 'main.curriculum' }}" href="{{ url_for('main.curriculum') }}">Curriculum</a>
                    <a class="nav-link {{ 'active' if request.endpoint == 'main.focus' }}" href="{{ url_for('main.focus') }}">Today’s Focus</a>
                    <a class="nav-link {{ 'active' if request.endpoint == 'main.revisions' }}" href="{{ url_for('main.revisions') }}">Revisions</a>
                    <a class="nav-link {{ 'active' if request.endpoint == 'main.revisions' }}" href="{{ url_for('main.logout') }}">logout</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container py-4 py-lg-5">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }} alert-dismissible fade show shadow-sm auto-dismiss-alert" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>


    <footer class="container pb-4 text-center text-secondary small">
        Built for focused Java DSA practice.
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>

setTimeout(function () {

    document
        .querySelectorAll(".auto-dismiss-alert")
        .forEach(function(alertElement) {

            const alert =
                bootstrap.Alert.getOrCreateInstance(
                    alertElement
                );

            alert.close();

        });

}, 3000);

</script>

</body>
</html>
